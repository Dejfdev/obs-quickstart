<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080"><script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script><style>
:root{--navy:#07111F;--paper:#F4F1E8;--lime:#B7F34A;--coral:#FF5C5C}*{box-sizing:border-box}html,body{margin:0;width:1920px;height:1080px;overflow:hidden;background:var(--navy)}body{font-family:Inter,sans-serif;color:var(--paper)}#root{position:relative;width:1920px;height:1080px;overflow:hidden}.scene{position:absolute;inset:0;overflow:hidden;background:var(--navy)}

#ss-signal-reticle{position:absolute;left:1390px;top:166px;width:400px;height:400px}.ring{position:absolute;border:4px solid var(--lime);border-radius:50%}.r1{inset:18px;border-left-color:transparent}.r2{inset:73px;border-right-color:transparent;border-width:3px}.r3{inset:129px;border-bottom-color:transparent;border-width:2px}.cross:before,.cross:after{content:"";position:absolute;background:rgba(244,241,232,.55)}.cross:before{width:400px;height:2px;top:199px}.cross:after{height:400px;width:2px;left:199px}.locator{position:absolute;width:24px;height:24px;border-radius:50%;background:var(--coral);right:40px;top:92px;box-shadow:0 0 0 12px rgba(255,92,92,.15)}#ss-status-chip{position:absolute;left:1468px;top:598px;padding:16px 25px;border:3px solid var(--coral);border-radius:999px;color:var(--paper);font:700 21px/1 monospace;letter-spacing:3px}.corner{position:absolute;bottom:72px;font:700 20px/1.3 monospace;letter-spacing:2px}.left{left:76px}.right{right:76px;display:flex;gap:10px;align-items:flex-end}.bar{width:14px;background:var(--lime)}.bar:nth-child(1){height:14px}.bar:nth-child(2){height:25px}.bar:nth-child(3){height:37px}.bar:nth-child(4){height:50px}.reg{position:absolute;border-color:var(--paper);opacity:.6}.reg.tl{left:72px;top:72px;border-left:3px solid;border-top:3px solid;width:52px;height:52px}.reg.br{right:72px;bottom:72px;border-right:3px solid;border-bottom:3px solid;width:52px;height:52px}
</style></head><body><div id="root" data-composition-id="main" data-start="0" data-duration="8" data-width="1920" data-height="1080"><div id="ss-scene" class="clip scene" data-start="0" data-duration="8" data-track-index="1"><div id="ss-grid" data-layout-allow-overflow></div><div id="ss-lime-glow" data-layout-allow-overflow></div><div id="ss-ghost-type" data-layout-allow-overflow>00:08</div><div class="reg tl"></div><div class="reg br"></div><div class="content"><div id="ss-eyebrow" class="eyebrow"><span class="ticks"><i></i><i></i></span>LIVE SIGNAL / 01</div><div id="ss-headline" class="hero" data-layout-allow-overlap><span id="ss-starting">STARTING</span><span id="ss-soon" class="soon">SOON</span></div><div id="ss-rule" class="streak"></div><div id="ss-subheadline" class="sub">Stream begins in a moment</div></div><div id="ss-signal-reticle"><div class="cross"></div><div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="locator"></div></div><div id="ss-status-chip">CONNECTING</div><div id="ss-corner-data" class="corner left">60 FPS&nbsp;&nbsp;/&nbsp;&nbsp;1920×1080<br>SIGNAL PATH A-01</div><div class="corner right"><i class="bar"></i><i class="bar"></i><i class="bar"></i><i class="bar"></i></div></div></div><script>
